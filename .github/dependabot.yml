version: 2

# Weekly dependency updates. Keeps the repo current during the 72h window and after.
# - `npm` ecosystem covers pnpm-lock (GitHub treats pnpm as an npm-ecosystem variant).
# - `github-actions` ecosystem keeps workflow action SHAs current once CI lands in Task 20+.
# - Grouped minor+patch into a single PR per run to cut reviewer noise; majors stay solo
#   because they can be breaking.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
      - automated
    commit-message:
      prefix: ci
      include: scope
