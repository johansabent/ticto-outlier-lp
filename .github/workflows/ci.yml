name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build (required for check:secrets)
        run: pnpm build
        env:
          HUBSPOT_PRIVATE_APP_TOKEN: ci-placeholder-token
          TYPEFORM_WEBHOOK_SECRET: ci-placeholder-typeform-secret-abcdef
          TYPEFORM_FORM_ID: FbFMsO5x
          NEXT_PUBLIC_TYPEFORM_FORM_ID: FbFMsO5x
          NEXT_PUBLIC_SITE_URL: https://ticto-ebulicao-lp.vercel.app

      - name: Check secret leaks
        run: pnpm check:secrets
